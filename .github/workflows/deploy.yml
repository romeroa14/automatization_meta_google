name: Deploy Production

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
              # Ruta del proyecto
              cd /var/www/html/Admetricas
              
              # Configuración de seguridad de Git
              git config --global --add safe.directory /var/www/html/Admetricas

              # Poner en mantenimiento
              docker exec laravel-php php artisan down || true

              # Resetear y clean
              git reset --hard HEAD
              git clean -fd

              # Pull del código
              git pull origin master

              # ========== BACKEND ==========
              echo "🔧 Actualizando backend..."
              
              # Corregir permisos de archivos gitignore
              chown -R adminvps:adminvps backend/bootstrap/cache/.gitignore backend/storage/app/.gitignore backend/storage/app/private/.gitignore backend/storage/app/public/.gitignore backend/storage/framework/.gitignore backend/storage/framework/cache/.gitignore backend/storage/framework/cache/data/.gitignore backend/storage/framework/sessions/.gitignore backend/storage/framework/testing/.gitignore backend/storage/framework/views/.gitignore backend/storage/logs/.gitignore 2>/dev/null || true
              chmod 644 backend/bootstrap/cache/.gitignore backend/storage/app/.gitignore backend/storage/app/private/.gitignore backend/storage/app/public/.gitignore backend/storage/framework/.gitignore backend/storage/framework/cache/.gitignore backend/storage/framework/cache/data/.gitignore backend/storage/framework/sessions/.gitignore backend/storage/framework/testing/.gitignore backend/storage/framework/views/.gitignore backend/storage/logs/.gitignore 2>/dev/null || true
              
              # Actualizar dependencias
              docker exec -u application laravel-php composer install --no-dev --optimize-autoloader --working-dir=/var/www/html/backend
              
              # Migraciones y cache
              docker exec laravel-php php artisan migrate --force
              docker exec laravel-php php artisan config:clear
              docker exec laravel-php php artisan cache:clear
              docker exec laravel-php php artisan route:clear
              docker exec laravel-php php artisan view:clear
              
              echo "✅ Backend actualizado"

              # ========== FRONTEND WEB (Vue 3) ==========
              echo "🚀 Actualizando frontend web..."

              # Detener contenedor viejo
              docker rm -f admetricas-frontend-web 2>/dev/null || true

              # Habilitar BuildKit
              export DOCKER_BUILDKIT=1

              # Reconstruir y levantar frontend
              docker compose up -d frontend-web
              
              echo "✅ Frontend web actualizado"

              # Levantar sitio
              docker exec laravel-php php artisan up

              # Reiniciar PHP para limpiar OPcache
              docker restart laravel-php

              echo "✅ Despliegue completado exitosamente"
